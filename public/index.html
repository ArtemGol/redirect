<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Подтверждение оплаты</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f2f5;
      color: #1c1e21;
    }

    .payment-card {
      background: #ffffff;
      padding: 40px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 340px;
      width: 90%;
    }

    .icon-shield {
      font-size: 56px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .sub-title {
      font-size: 15px;
      color: #606770;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .pay-button {
      display: block;
      background-color: #6200EE;
      color: #ffffff;
      text-decoration: none;
      padding: 18px 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      transition: transform 0.1s, background-color 0.2s;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .pay-button:active {
      transform: scale(0.98);
      background-color: #3700B3;
    }

    #error-zone {
      display: none;
      color: #fa3e3e;
    }

    #main-zone {
      display: none;
    }
  </style>
</head>

<body>

<div id="main-zone" class="payment-card">
  <div class="icon-shield">🛡️</div>
  <div class="title">Безопасный переход</div>
  <div class="sub-title">
    Нажмите кнопку ниже, чтобы открыть официальную страницу оплаты шлюза.
  </div>

  <!-- Сама кнопка -->
  <a href="#" id="redirect-link" class="pay-button">
    ПЕРЕЙТИ К ОПЛАТЕ
  </a>
</div>

<div id="error-zone">
  <div class="title">Ошибка</div>
  <p>Ссылка не найдена или устарела.</p>
  <p>Пожалуйста, вернитесь в приложение.</p>
</div>

<script>
  (function() {
    // 1. Извлекаем URL из параметров
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('redirectLink') || params.get('url');

    const mainZone = document.getElementById('main-zone');
    const errorZone = document.getElementById('error-zone');
    const redirectLink = document.getElementById('redirect-link');

    if (targetUrl) {
      mainZone.style.display = 'block';

      redirectLink.href = targetUrl;

      redirectLink.onclick = function() {
        console.log("User initiated redirect to payment gateway...");
      };
    } else {
      errorZone.style.display = 'block';
    }
  })();
</script>

</body>

</html>
